<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Autoatendimento</title>

<style>
body {
    font-family: Arial;
    background: #1e1e2f;
    color: white;
    margin: 0;
}

/* layout */
.container {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    height: calc(100vh - 140px);
}

/* produtos */
.produtos {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    padding: 10px;
}

.produto {
    padding: 15px;
    border: none;
    border-radius: 10px;
    background: #4caf50;
    color: white;
    cursor: pointer;
}
.produto:hover { background: #66bb6a; }

/* áreas */
.lista { background: #2c2c3c; padding:10px; }
.painel { text-align:center; padding:10px; }
.cupom {
    background: #fff8b0;
    color: black;
    font-family: monospace;
    padding: 10px;
    max-height: 300px;
    overflow-y: auto;
    display: none;
}

/* lista */
.item {
    display:flex;
    justify-content:space-between;
    margin:5px 0;
}
.remover {
    background:red;
    padding:2px 6px;
    border-radius:5px;
    cursor:pointer;
}

/* footer */
.footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #111;
    padding: 10px;
    text-align: center;
    font-size: 14px;
}
</style>
</head>

<body>

<h2 style="text-align:center;">🛒 Autoatendimento</h2>

<div class="produtos">
    <button class="produto" onclick="add('🥤 Coca',5)">🥤 Coca<br>R$5</button>
    <button class="produto" onclick="add('💧 Água',3)">💧 Água<br>R$3</button>
    <button class="produto" onclick="add('🧃 Suco',4)">🧃 Suco<br>R$4</button>
    <button class="produto" onclick="add('🥟 Salgado',7)">🥟 Salgado<br>R$7</button>
    <button class="produto" onclick="add('🍬 Doce',3)">🍬 Doce<br>R$3</button>

    <button class="produto" onclick="add('☕ Café',2)">☕ Café<br>R$2</button>
    <button class="produto" onclick="add('🍞 Pão',1)">🍞 Pão<br>R$1</button>
    <button class="produto" onclick="add('🎂 Bolo',6)">🎂 Bolo<br>R$6</button>
    <button class="produto" onclick="add('🍫 Chocolate',5)">🍫 Chocolate<br>R$5</button>
    <button class="produto" onclick="add('🥤 Refri',6)">🥤 Refri<br>R$6</button>
</div>

<div class="container">

<div class="lista">
    <h3>Itens</h3>
    <div id="lista"></div>
</div>

<div class="painel">
    <h3>Total: R$ <span id="total">0</span></h3>
    <input id="cpf" placeholder="CPF" style="width:150px;">
    <br><br>
    <button onclick="finalizar()">Finalizar</button>
    <button onclick="iniciar()">Iniciar</button>
</div>

<div class="cupom" id="cupom"></div>

</div>

<div class="footer">
    Terminal: 01 | Operador: Autônomo |
    Data: <span id="data"></span> |
    Hora: <span id="hora"></span>
</div>

<script>

let carrinho = [];
let total = 0;

function beep(){
    let ctx = new (window.AudioContext||window.webkitAudioContext)();
    let osc = ctx.createOscillator();
    osc.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime+0.1);
}

function add(nome, preco){
    carrinho.push({nome,preco});
    total+=preco;
    beep();
    atualizar();
}

function remover(i){
    total-=carrinho[i].preco;
    carrinho.splice(i,1);
    atualizar();
}

function atualizar(){
    document.getElementById("total").innerText = total.toFixed(2);
    let html="";
    carrinho.forEach((item,i)=>{
        html+=`
        <div class="item">
            ${item.nome} - R$${item.preco}
            <span class="remover" onclick="remover(${i})">X</span>
        </div>`;
    });
    document.getElementById("lista").innerHTML = html;
}

function finalizar(){
    if(carrinho.length==0){ alert("Sem itens"); return;}
    let cpf=document.getElementById("cpf").value;
    let txt="==== CUPOM ====\n";
    carrinho.forEach(i=>{ txt+=i.nome+" - R$"+i.preco.toFixed(2)+"\n"; });
    txt+="----------------\n";
    txt+="TOTAL: R$ "+total.toFixed(2)+"\n";
    if(cpf) txt+="CPF: "+cpf+"\n";
    let c=document.getElementById("cupom");
    c.style.display="block";
    c.innerText=txt;
}

/* limpar tudo */
function iniciar(){
    carrinho=[];
    total=0;
    document.getElementById("cpf").value="";
    document.getElementById("cupom").style.display="none";
    atualizar();
}

/* data e hora */
function atualizarRelogio(){
    let d=new Date();
    document.getElementById("data").innerText = d.toLocaleDateString();
    document.getElementById("hora").innerText = d.toLocaleTimeString();
}

setInterval(atualizarRelogio,1000);
atualizarRelogio();

</script>

</body>
</html>
